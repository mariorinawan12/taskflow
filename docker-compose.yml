services:
  postgres:
    image: postgres:16
    container_name: taskflow-db
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - taskflow-pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    ports:
      - "6379:6379"
    volumes:
      - taskflow-redisdata:/data

volumes:
  taskflow-pgdata:
  taskflow-redisdata: